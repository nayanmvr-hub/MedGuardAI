<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedGuard AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>MedGuard AI</h1>
<p class="subtitle">AI Powered Patient Intake Analyzer</p>


<div class="glass-card">

<h2>Patient Intake Form</h2>

<form id="healthForm">

<input type="text" id="pid" placeholder="Patient ID (PT-001)" required>

<input type="text" id="name" placeholder="Patient Name" required>

<input type="date" id="dob" required>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="text" id="ward" placeholder="Ward (Emergency / OPD)">

<textarea id="symptoms" placeholder="Symptoms" required></textarea>

<input type="text" id="bp" placeholder="Blood Pressure (120/80)" required>

<input type="number" id="pulse" placeholder="Pulse">

<input type="number" id="spo2" placeholder="SpO2 (optional)">

<input type="text" id="allergies" placeholder="Known Allergies (optional)">

<input type="text" id="medications" placeholder="Current Medications (optional)">

<textarea id="notes" placeholder="Doctor Notes (optional)"></textarea>

<button type="submit">Analyze Patient</button>

</form>

</div>


<div class="glass-card">

<h2>Patient Intake Reports</h2>

<div id="reports"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
